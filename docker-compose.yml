services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/quizapp
      - JWT_SECRET=supersecretkey
      - PORT=5000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mongo-data:
